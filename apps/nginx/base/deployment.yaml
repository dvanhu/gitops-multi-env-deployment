apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: dvanhu/gitops-nginx:a2b2de0cdfe4ea4fed3e48c0bc898c9fe9a52295
        ports:
        - containerPort: 80
