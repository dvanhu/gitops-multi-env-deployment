apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: dvanhu/gitops-nginx:c0ea534318b5798667fc50afef36cc10170d381c
        ports:
        - containerPort: 80
